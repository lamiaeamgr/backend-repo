# SonarQube — backend-repo (Node.js / Express)
# Jenkins example: sonar-scanner -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN

sonar.projectKey=backend-repo
sonar.projectName=backend-repo
sonar.projectVersion=1.0

sonar.sources=controllers,routes,models,app.js,server.js
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

sonar.exclusions=**/node_modules/**,**/coverage/**,**/.jenkins-node/**

sonar.sourceEncoding=UTF-8
