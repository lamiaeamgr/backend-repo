services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: backend_repo_db
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    image: backend-repo:latest
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      # Inside Compose, other services are reachable by service name (here: mongo).
      MONGODB_URI: mongodb://mongo:27017/backend_repo_db

volumes:
  mongo_data:
